openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: extract
    description: Image extraction operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /extract:
    post:
      operationId: extractImages
      tags: [extract]
      summary: Extract all images from a webpage
      description: |
        Loads the URL in a headless browser, scrolls to trigger lazy loading,
        waits for network to be idle, then collects every image source on the
        page (img src, srcset, data-src, CSS background-image, video posters,
        Open Graph tags). Each image is verified for HTTP status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractRequest"
      responses:
        "200":
          description: Extraction complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Extraction failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ExtractRequest:
      type: object
      properties:
        url:
          type: string
          description: The webpage URL to scan
          example: https://example.com
      required:
        - url
    ImageSource:
      type: string
      enum:
        - img
        - srcset
        - data-src
        - background
        - video-poster
        - meta
        - picture
      description: How this image was discovered on the page
    ImageStatus:
      type: string
      enum:
        - loaded
        - broken
        - unknown
      description: Verification result for fetching the image URL
    ImageItem:
      type: object
      properties:
        id:
          type: string
          description: Stable hash identifier
        url:
          type: string
          description: Absolute image URL
        source:
          $ref: "#/components/schemas/ImageSource"
        alt:
          type: string
          description: Alt text if present
        renderedWidth:
          type: integer
          description: Width as rendered on the page (0 if unknown)
        renderedHeight:
          type: integer
          description: Height as rendered on the page (0 if unknown)
        naturalWidth:
          type: integer
          description: Intrinsic image width (0 if unknown)
        naturalHeight:
          type: integer
          description: Intrinsic image height (0 if unknown)
        sizeBytes:
          type: integer
          description: Content-Length in bytes (0 if unknown)
        contentType:
          type: string
          description: MIME type from the response (empty if unknown)
        extension:
          type: string
          description: File extension guess (jpg, png, webp, svg, gif)
        status:
          $ref: "#/components/schemas/ImageStatus"
        httpStatus:
          type: integer
          description: HTTP status code from the verification probe
      required:
        - id
        - url
        - source
        - alt
        - renderedWidth
        - renderedHeight
        - naturalWidth
        - naturalHeight
        - sizeBytes
        - contentType
        - extension
        - status
        - httpStatus
    ExtractResult:
      type: object
      properties:
        requestedUrl:
          type: string
        finalUrl:
          type: string
          description: URL after any redirects
        pageTitle:
          type: string
        durationMs:
          type: integer
          description: Total time spent rendering and extracting
        totalImages:
          type: integer
        loadedCount:
          type: integer
        brokenCount:
          type: integer
        scrollPasses:
          type: integer
          description: Number of scroll passes performed for lazy loading
        renderer:
          type: string
          description: The renderer used (e.g. "playwright-chromium" or "static-html")
        warnings:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageItem"
      required:
        - requestedUrl
        - finalUrl
        - pageTitle
        - durationMs
        - totalImages
        - loadedCount
        - brokenCount
        - scrollPasses
        - renderer
        - warnings
        - images
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
