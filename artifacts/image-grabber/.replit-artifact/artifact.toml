kind = "web"
previewPath = "/"
title = "Image Grabber"
version = "1.0.0"
id = "artifacts/image-grabber"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18529

[services.development]
run = "pnpm --filter @workspace/image-grabber run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/image-grabber", "run", "build" ]
publicDir = "artifacts/image-grabber/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18529"
BASE_PATH = "/"
